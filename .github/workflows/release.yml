name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: osv2gpx.exe
            output: osv2gpx.exe
            archive: osv2gpx-windows-amd64.zip
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: osv2gpx
            output: osv2gpx
            archive: osv2gpx-darwin-amd64.tar.gz
          - runner: macos-15
            target: aarch64-apple-darwin
            binary: osv2gpx
            output: osv2gpx
            archive: osv2gpx-darwin-arm64.tar.gz
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: osv2gpx
            output: osv2gpx
            archive: osv2gpx-linux-amd64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package Windows binary
        if: startsWith(matrix.runner, 'windows')
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.output }}"
          Compress-Archive -Path "${{ matrix.output }}" -DestinationPath "${{ matrix.archive }}" -Force

      - name: Package Unix binary
        if: ${{ !startsWith(matrix.runner, 'windows') }}
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.output }}"
          tar -czf "${{ matrix.archive }}" "${{ matrix.output }}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.archive }}" --clobber
