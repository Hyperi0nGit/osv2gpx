name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: osv2gpx.exe
            archive: osv2gpx-windows-amd64.zip
          - goos: darwin
            goarch: amd64
            output: osv2gpx
            archive: osv2gpx-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            output: osv2gpx
            archive: osv2gpx-darwin-arm64.tar.gz
          - goos: linux
            goarch: amd64
            output: osv2gpx
            archive: osv2gpx-linux-amd64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o "${{ matrix.output }}" .

      - name: Package binary
        shell: bash
        run: |
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip "${{ matrix.archive }}" "${{ matrix.output }}"
          else
            tar -czf "${{ matrix.archive }}" "${{ matrix.output }}"
          fi

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.archive }}" --clobber
